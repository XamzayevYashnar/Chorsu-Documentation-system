{% extends 'base.html' %}

{% block content %}
<style>
    /* Django formadagi har bir maydon xatosi uchun */
    .errorlist {
        color: red;
        font-size: 0.9em;
        list-style: none;
        padding: 0;
        margin-bottom: 10px;
    }
    
    .custom-error {
        color: red;
        font-size: 0.9em;
        list-style: none;
        padding: 0;
        margin-bottom: 10px;
    }
</style>

<form action="{% url 'addcat' %}" method="post" enctype="multipart/form-data">
    {% csrf_token %}

    {% if error %}
        <strong class="custom-error">{{ error }}</strong>
    {% endif %}

    {# Umumiy form xatolari (non-field errors) #}
    {{ form.non_field_errors }}

    {{ form.as_p }}
    
    <button type="submit">Yaratish</button>
</form>
{% endblock %}
